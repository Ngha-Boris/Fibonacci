name: Rust CI/CD Pipeline

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
      - develop

jobs:
  build:
    runs-on: self-hosted

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust
        uses: actions-rs/toolchain@v1
        with:
          toolchain: stable
          profile: minimal
          override: true
          components: rustfmt, clippy

      - name: Cache cargo registry
        uses: actions/cache@v3
        with:
          path: ~/.cargo/registry
          key: ${{ runner.os }}-cargo-registry-${{ hashFiles('fib/Cargo.lock') }}

      - name: Cache cargo index
        uses: actions/cache@v3
        with:
          path: ~/.cargo/git
          key: ${{ runner.os }}-cargo-git-${{ hashFiles('fib/Cargo.lock') }}

      - name: Cache target directory
        uses: actions/cache@v3
        with:
          path: fib/target
          key: ${{ runner.os }}-target-${{ hashFiles('fib/Cargo.lock') }}

      - name: Install Dependencies
        run: cargo fetch
        working-directory: fib

      - name: Check formatting
        run: cargo fmt -- --check
        working-directory: fib

      - name: Run clippy
        run: cargo clippy -- -D warnings
        working-directory: fib

      - name: Run Tests
        run: cargo test
        working-directory: fib

      - name: Build Project
        run: cargo build --release
        working-directory: fib

  deploy:
    runs-on: self-hosted
    needs: build
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust
        uses: actions-rs/toolchain@v1
        with:
          toolchain: stable
          profile: minimal
          override: true

      - name: Cache cargo registry
        uses: actions/cache@v3
        with:
          path: ~/.cargo/registry
          key: ${{ runner.os }}-cargo-registry-${{ hashFiles('fib/Cargo.lock') }}

      - name: Cache cargo index
        uses: actions/cache@v3
        with:
          path: ~/.cargo/git
          key: ${{ runner.os }}-cargo-git-${{ hashFiles('fib/Cargo.lock') }}

      - name: Cache target directory
        uses: actions/cache@v3
        with:
          path: fib/target
          key: ${{ runner.os }}-target-${{ hashFiles('fib/Cargo.lock') }}

      - name: Install Dependencies
        run: cargo fetch
        working-directory: fib

      - name: Build Project
        run: cargo build --release
        working-directory: fib

      - name: Deploy to Production
        run: |
          # Add your deployment script/command here
          echo "Deploying to production..."
        working-directory: fib
